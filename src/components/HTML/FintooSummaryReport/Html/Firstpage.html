<html lang="en">

    <link rel="stylesheet" href="./css/Print.css">
    <title></title>
    <style>
        body {
            margin: 0;
            margin: 0;
            font-family: "Red Hat Text", "Arial", "Helvetica", "sans-serif";
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .First_Page {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background: url('./Assets/01_front_back.svg');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
        }

        .innerSection {
            width: 100%;
            padding: 2rem;
            margin: auto;
            font-size: .7rem;
            position: absolute;
            margin-top: 1rem;
        }

        .Social-icons {
            width: 90%;
            margin: auto;
        }

        .Social-icons td {
            padding-left: 1rem;
        }

        .Social-icons img {
            width: 20px;
            vertical-align: text-bottom;
        }

        .NameReport {
            margin-top: 10rem;
        }

        .NameReport table {
            width: 80%;
            margin: auto;
        }

        .NameReport img {
            width: 200px;
            margin-top: 1rem;
        }

        .RpTxt {
            font-size: 1.99rem;
            margin-bottom: .5rem;
        }

        .ReportName {
            background-color: #24a7de;
            width: 21rem;
            padding: 1rem;
            font-size: 2.8rem;
            font-weight: 700;
            color: #fff;
            border-radius: 2px;
        }

        .ReportDate {
            font-size: 1.42rem;
            text-indent: 10px;
            letter-spacing: 7px;
            margin-top: .5rem;
        }

        .BottomSection {
            position: fixed;
            bottom: 2rem;
            right: 5rem;
        }

        .AppSection {
            margin-left: 3rem;
        }

        .BottomSection .Scan img {
            width: 50px;
            height: 50px;
            border-radius: 5px;
        }

        .Ios a {
            margin-left: 1rem;
        }

        .BottomSection img {
            width: 150px;
        }

        .SEBIText {
            color: #fff;
            font-size: 1.3rem;
        }

        .innerSection .Social-icons a {
            text-decoration: none;
            color: #666363;
            font-weight: 600;
        }
    </style>
    <script></script>
</head>

    <section class="First_Page">

                        <td><a href="https://www.youtube.com/channel/UC00AMcwwfUKrV-XD5n6hWyQ/videos"><span> <img
                                        src="./Assets/01_06_youtube.png" /> </span> fintooapp </a></td>
